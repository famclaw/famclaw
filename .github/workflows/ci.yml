name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install OPA
        run: |
          curl -L -o /usr/local/bin/opa \
            https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x /usr/local/bin/opa

      - name: Go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./... -v -coverprofile=coverage.out
        env:
          CGO_ENABLED: 0

      - name: OPA policy tests
        run: opa test ./policies/family/ ./policies/data/ -v

      - name: Coverage check (>80% on critical packages)
        run: |
          go tool cover -func=coverage.out > coverage.txt
          fail=0
          for pkg in internal/policy internal/classifier internal/identity; do
            # Average coverage across all functions in the package
            avg=$(grep "github.com/famclaw/famclaw/${pkg}/" coverage.txt \
              | awk '{sum += $3+0; n++} END {if(n>0) printf "%.1f", sum/n; else print "0"}')
            echo "${pkg}: ${avg}%"
            if (( $(echo "$avg < 80" | bc -l) )); then
              echo "FAIL: ${pkg} coverage ${avg}% < 80%"
              fail=1
            fi
          done
          # Gateway router (router.go only, not telegram/discord/whatsapp sub-packages)
          router_avg=$(grep 'internal/gateway/router.go' coverage.txt \
            | awk '{sum += $3+0; n++} END {if(n>0) printf "%.1f", sum/n; else print "0"}')
          echo "gateway/router.go: ${router_avg}%"
          if (( $(echo "$router_avg < 80" | bc -l) )); then
            echo "FAIL: gateway/router.go coverage ${router_avg}% < 80%"
            fail=1
          fi
          [ "$fail" -eq 0 ] || exit 1
          echo "All coverage gates passed"

  cross-compile:
    name: Cross-compile
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: arm64
            name: rpi4-arm64
          - goos: linux
            goarch: arm
            goarm: 7
            name: rpi3-armv7
          - goos: linux
            goarch: amd64
            name: linux-amd64
          - goos: darwin
            goarch: arm64
            name: mac-arm64
          - goos: android
            goarch: arm64
            name: android-arm64

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build ${{ matrix.name }}
        run: |
          GOOS=${{ matrix.goos }} \
          GOARCH=${{ matrix.goarch }} \
          GOARM=${{ matrix.goarm || '' }} \
          CGO_ENABLED=0 \
          go build -ldflags="-s -w" -o bin/famclaw-${{ matrix.name }} ./cmd/famclaw
        env:
          CGO_ENABLED: 0

      - name: Verify binary exists and is non-zero
        run: |
          ls -lh bin/famclaw-${{ matrix.name }}
          test -s bin/famclaw-${{ matrix.name }}

  security:
    name: Security checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || echo "::warning::govulncheck found vulnerabilities in dependencies — see output above"
        # Warn-only: remaining vulns are in OPA's transitive deps (OpenTelemetry),
        # not our code. Will enforce once OPA releases a fix.

      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -severity medium -quiet ./... || true
        # gosec warns but does not block — too many false positives on new codebases

  # dependency-review:
  #   Uncomment after enabling Dependency Graph in repo settings:
  #   Settings → Code security → Dependency graph → Enable
  #   name: Dependency review
  #   runs-on: ubuntu-latest
  #   if: github.event_name == 'pull_request'
  #   permissions:
  #     contents: read
  #     pull-requests: write
  #   steps:
  #     - uses: actions/checkout@v6
  #     - uses: actions/dependency-review-action@v4
  #       with:
  #         fail-on-severity: critical

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Integration tests
        run: go test -tags integration ./... -v -timeout 120s
        env:
          CGO_ENABLED: 0

  # ── Required gate (register "CI Pass" as the required status check) ─────
  ci-pass:
    name: CI Pass
    if: always()
    needs: [test, cross-compile, security, integration]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs succeeded
        run: |
          results='${{ toJSON(needs) }}'
          echo "$results"
          if echo "$results" | grep -q '"result":"failure"\|"result":"cancelled"'; then
            echo "One or more jobs failed or were cancelled."
            exit 1
          fi
          echo "All jobs passed."
