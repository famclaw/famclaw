name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      # Keep in sync with the open-policy-agent/opa version pinned in go.mod.
      OPA_VERSION: 1.15.2
      # SHA256 of opa_linux_amd64_static for v1.15.2 (verified against the
      # upstream-published .sha256 file). Bump together with OPA_VERSION.
      OPA_SHA256: a9d9481e463e7af8cb1a2cd7c3deb764f0327b3281c54e632546c2f425fc0824
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache OPA binary
        id: cache-opa
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: /usr/local/bin/opa
          key: opa-linux-amd64-${{ env.OPA_VERSION }}

      - name: Install OPA
        if: steps.cache-opa.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          # Pull from GitHub releases (not openpolicyagent.org/downloads/latest,
          # which has flaked with multi-minute zero-byte stalls). Retry on
          # transient network failures and bound the wall-clock so a single
          # bad run can't hold the job for 5+ minutes.
          curl --fail --location \
               --retry 5 --retry-connrefused --retry-delay 5 \
               --connect-timeout 15 --max-time 120 \
               -o "${RUNNER_TEMP}/opa" \
               "https://github.com/open-policy-agent/opa/releases/download/v${OPA_VERSION}/opa_linux_amd64_static"
          # Verify integrity against the pinned SHA256 before promoting the
          # binary to PATH. Detects download corruption AND a compromised
          # release artifact — opa version alone would happily run a
          # malicious-but-runnable binary.
          echo "${OPA_SHA256}  ${RUNNER_TEMP}/opa" | sha256sum -c -
          install -m 0755 "${RUNNER_TEMP}/opa" /usr/local/bin/opa

      - name: Verify OPA
        run: opa version

      - name: Go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./... -v -coverprofile=coverage.out
        env:
          CGO_ENABLED: 0

      - name: OPA policy tests
        run: opa test internal/policy/policies/family/ internal/policy/policies/data/ -v

      - name: Coverage check (>80% on critical packages)
        run: |
          go tool cover -func=coverage.out > coverage.txt
          fail=0
          for pkg in internal/policy internal/classifier internal/identity; do
            # Average coverage across all functions in the package
            avg=$(grep "github.com/famclaw/famclaw/${pkg}/" coverage.txt \
              | awk '{sum += $3+0; n++} END {if(n>0) printf "%.1f", sum/n; else print "0"}')
            echo "${pkg}: ${avg}%"
            if (( $(echo "$avg < 80" | bc -l) )); then
              echo "FAIL: ${pkg} coverage ${avg}% < 80%"
              fail=1
            fi
          done
          # Gateway router (router.go only, not telegram/discord/whatsapp sub-packages)
          router_avg=$(grep 'internal/gateway/router.go' coverage.txt \
            | awk '{sum += $3+0; n++} END {if(n>0) printf "%.1f", sum/n; else print "0"}')
          echo "gateway/router.go: ${router_avg}%"
          if (( $(echo "$router_avg < 80" | bc -l) )); then
            echo "FAIL: gateway/router.go coverage ${router_avg}% < 80%"
            fail=1
          fi
          [ "$fail" -eq 0 ] || exit 1
          echo "All coverage gates passed"

  cross-compile:
    name: Cross-compile
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: arm64
            name: rpi4-arm64
          - goos: linux
            goarch: arm
            goarm: 7
            name: rpi3-armv7
          - goos: linux
            goarch: amd64
            name: linux-amd64
          - goos: darwin
            goarch: arm64
            name: mac-arm64
          - goos: android
            goarch: arm64
            name: android-arm64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build ${{ matrix.name }}
        run: |
          GOOS=${{ matrix.goos }} \
          GOARCH=${{ matrix.goarch }} \
          GOARM=${{ matrix.goarm || '' }} \
          CGO_ENABLED=0 \
          go build -ldflags="-s -w" -o bin/famclaw-${{ matrix.name }} ./cmd/famclaw
        env:
          CGO_ENABLED: 0

      - name: Verify binary exists and is non-zero
        run: |
          ls -lh bin/famclaw-${{ matrix.name }}
          test -s bin/famclaw-${{ matrix.name }}

  security:
    name: Security checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || echo "::warning::govulncheck found vulnerabilities in dependencies — see output above"
        # Warn-only: remaining vulns are in OPA's transitive deps (OpenTelemetry),
        # not our code. Will enforce once OPA releases a fix.

      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -severity medium -quiet ./... || true
        # gosec warns but does not block — too many false positives on new codebases

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: critical

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Integration tests
        run: go test -tags integration ./... -v -timeout 120s
        env:
          CGO_ENABLED: 0

  # ── Required gate (register "CI Pass" as the required status check) ─────
  ci-pass:
    name: CI Pass
    if: always()
    needs: [test, cross-compile, security, dependency-review, integration]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs succeeded
        run: |
          results='${{ toJSON(needs) }}'
          echo "$results"
          if echo "$results" | jq -e 'to_entries | map(.value.result) | any(. == "failure" or . == "cancelled")' > /dev/null; then
            echo "One or more jobs failed or were cancelled."
            exit 1
          fi
          echo "All jobs passed."
