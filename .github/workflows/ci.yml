name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install OPA
        run: |
          curl -L -o /usr/local/bin/opa \
            https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x /usr/local/bin/opa

      - name: Go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./... -v -coverprofile=coverage.out
        env:
          CGO_ENABLED: 0

      - name: OPA policy tests
        run: opa test ./policies/family/ ./policies/data/ -v

      - name: Coverage check (>80% on critical packages)
        run: |
          go tool cover -func=coverage.out | grep -E \
            'internal/policy|internal/classifier|internal/identity|internal/gateway/router' \
            | awk '{if ($3+0 < 80) {print "FAIL: " $0; exit 1}}'

  cross-compile:
    name: Cross-compile
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: arm64
            name: rpi4-arm64
          - goos: linux
            goarch: arm
            goarm: 7
            name: rpi3-armv7
          - goos: linux
            goarch: amd64
            name: linux-amd64
          - goos: darwin
            goarch: arm64
            name: mac-arm64
          - goos: android
            goarch: arm64
            name: android-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build ${{ matrix.name }}
        run: |
          GOOS=${{ matrix.goos }} \
          GOARCH=${{ matrix.goarch }} \
          GOARM=${{ matrix.goarm || '' }} \
          CGO_ENABLED=0 \
          go build -ldflags="-s -w" -o bin/famclaw-${{ matrix.name }} ./cmd/famclaw
        env:
          CGO_ENABLED: 0

      - name: Verify binary exists and is non-zero
        run: |
          ls -lh bin/famclaw-${{ matrix.name }}
          test -s bin/famclaw-${{ matrix.name }}

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Integration tests
        run: go test -tags integration ./... -v -timeout 120s
        env:
          CGO_ENABLED: 0
