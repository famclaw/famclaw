name: Release

on:
  push:
    tags:
      - 'v*'

# No workflow-level permissions — each job declares its own (least privilege)

jobs:
  goreleaser:
    name: Build & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - uses: goreleaser/goreleaser-action@e24998b8b67b290c2fa8b7c14fcfa7de2c5c9b8c # v7.1.0
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/checksums.txt

  sd-images:
    name: Build SD images (${{ matrix.label }})
    runs-on: ubuntu-latest
    needs: goreleaser
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - arch: arm64
            binary: famclaw-linux-arm64
            image_name: famclaw-rpi4-arm64
            label: "RPi 4/5 64-bit"
          - arch: armhf
            binary: famclaw-linux-armv7
            image_name: famclaw-rpi3-armv7
            label: "RPi 3/2/Zero 32-bit"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download binary from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ github.ref_name }} \
            --pattern '${{ matrix.binary }}.tar.xz' \
            --dir dist/
          cd dist && tar xf ${{ matrix.binary }}.tar.xz
          chmod +x famclaw

      - name: Install image tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y kpartx qemu-user-static

      - name: Build SD image
        run: |
          chmod +x scripts/build-image.sh
          sudo scripts/build-image.sh \
            dist/famclaw \
            ${{ matrix.arch }} \
            dist/${{ matrix.image_name }}.img \
            ${{ github.ref_name }}

      - name: Compress and checksum
        run: |
          cd dist
          sudo chown $(id -u):$(id -g) ${{ matrix.image_name }}.img
          xz -9 --threads=0 ${{ matrix.image_name }}.img
          sha256sum ${{ matrix.image_name }}.img.xz > ${{ matrix.image_name }}.img.xz.sha256

      - name: Upload SD images to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} \
            dist/${{ matrix.image_name }}.img.xz \
            dist/${{ matrix.image_name }}.img.xz.sha256

  post-release:
    name: Post-release verification
    needs: goreleaser
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      # ── 1. Download all release artifacts ──────────────────────────────────
      - name: Download release artifacts
        run: |
          mkdir -p dist
          gh release download ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --dir dist/

      # ── 2. Verify cosign signature (sigstore bundle) ───────────────────────
      - name: Verify cosign signature
        run: |
          cosign verify-blob \
            --bundle dist/checksums.txt.sigstore.json \
            --certificate-identity-regexp='github\.com/famclaw/famclaw' \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            dist/checksums.txt

      # ── 3. Verify checksums ────────────────────────────────────────────────
      - name: Verify checksums
        run: |
          cd dist
          # Strict: verify all checksums, don't ignore missing files
          # Filter to only linux-amd64 (the binary we test) + any SBOMs present
          grep -E 'linux-amd64|\.sbom\.json' checksums.txt > verify.txt || true
          [ -s verify.txt ] || (echo "FAIL: no matching checksums found" && exit 1)
          sha256sum -c verify.txt

      # ── 4. Extract and verify binary ───────────────────────────────────────
      - name: Extract binary
        run: |
          tar xf dist/famclaw-linux-amd64.tar.xz -C dist/
          chmod +x dist/famclaw

      - name: Verify version
        run: |
          version=$(dist/famclaw --version 2>&1 || true)
          echo "Binary version: $version"
          # GoReleaser strips 'v' prefix: tag v0.3.1 → binary reports 0.3.1
          expected="${{ github.ref_name }}"
          expected_no_v="${expected#v}"
          echo "$version" | grep -qF "${expected_no_v}" || \
            (echo "FAIL: expected '${expected_no_v}' in version output: $version" && exit 1)

      # ── 5. Verify GitHub attestation ───────────────────────────────────────
      - name: Verify build attestation
        run: |
          gh attestation verify dist/checksums.txt \
            --repo ${{ github.repository }}

      # ── 6. Start server + integration smoke tests ──────────────────────────
      - name: Install OPA
        run: |
          curl -L -o /usr/local/bin/opa \
            https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x /usr/local/bin/opa

      - name: Start FamClaw server
        run: |
          cat > /tmp/test-config.yaml << 'TESTCFG'
          server:
            port: 8080
            secret: "post-release-test-secret-32chars!!"
          llm:
            base_url: ""
            model: ""
          users: []
          policies:
            dir: ./policies/family
            data_dir: ./policies/data
          storage:
            db_path: /tmp/famclaw-test.db
          TESTCFG
          dist/famclaw --config /tmp/test-config.yaml &
          for i in $(seq 1 15); do
            curl -sf http://localhost:8080/ > /dev/null 2>&1 && break
            sleep 1
          done

      - name: "Smoke: root redirects to /setup"
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/)
          echo "Root: HTTP $status"
          [ "$status" = "307" ] || (echo "FAIL: expected 307" && exit 1)

      - name: "Smoke: /setup serves wizard"
        run: |
          curl -sf http://localhost:8080/setup | grep -q "FamClaw" || \
            (echo "FAIL: /setup missing" && exit 1)

      - name: "Smoke: hardware detect API"
        run: |
          curl -sf http://localhost:8080/api/setup/detect | jq -e '.os' || \
            (echo "FAIL: detect API" && exit 1)

      - name: "Smoke: settings API (first boot)"
        run: |
          curl -sf http://localhost:8080/api/settings | jq -e '.llm' || \
            (echo "FAIL: settings GET" && exit 1)

      - name: "Smoke: wizard setup flow"
        run: |
          curl -sf -X POST http://localhost:8080/api/settings \
            -H 'Content-Type: application/json' \
            -d '{
              "llm": {"base_url": "http://localhost:11434", "model": "test"},
              "users": [
                {"name": "testparent", "display_name": "Test Parent", "role": "parent", "pin": "9999"}
              ],
              "gateways": {
                "telegram": {"enabled": false},
                "discord": {"enabled": false},
                "whatsapp": {"enabled": false}
              }
            }' | jq -e '.status == "saved"' || \
            (echo "FAIL: wizard POST" && exit 1)

      - name: "Smoke: PIN enforcement — POST without PIN returns 403"
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' -X POST \
            http://localhost:8080/api/settings \
            -H 'Content-Type: application/json' \
            -d '{"llm":{"base_url":"http://evil.com","model":"x"}}')
          echo "POST without PIN: HTTP $status"
          [ "$status" = "403" ] || (echo "FAIL: expected 403, got $status" && exit 1)

      - name: "Smoke: PIN enforcement — POST with correct PIN returns 200"
        run: |
          curl -sf -X POST http://localhost:8080/api/settings \
            -H 'Content-Type: application/json' \
            -H 'X-Parent-PIN: 9999' \
            -d '{"llm":{"base_url":"http://localhost:11434","model":"test"}}' \
            | jq -e '.status == "saved"' || \
            (echo "FAIL: PIN-auth POST failed" && exit 1)

      # ── 7. Verify SBOM ────────────────────────────────────────────────────
      - name: Verify SBOM format
        run: |
          count=0
          for f in dist/*.sbom.json; do
            [ -f "$f" ] || continue
            jq -e '.bomFormat == "CycloneDX"' "$f" || \
              (echo "FAIL: $f not valid CycloneDX" && exit 1)
            echo "SBOM valid: $f"
            count=$((count + 1))
          done
          [ "$count" -gt 0 ] || (echo "FAIL: no SBOM files found" && exit 1)
          echo "Verified $count SBOM file(s)"

      # ── 8. Summary ─────────────────────────────────────────────────────────
      - name: Post-release summary
        if: always()
        run: |
          echo "## Post-Release Verification: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Cosign signature (sigstore bundle) | Verified |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA256 checksums | Verified |" >> $GITHUB_STEP_SUMMARY
          echo "| Binary version | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build attestation | Verified |" >> $GITHUB_STEP_SUMMARY
          echo "| Server startup | Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Wizard redirect (307) | Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Setup detect API | Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Settings API | Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Wizard setup flow | Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| PIN-auth settings | Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| SBOM (CycloneDX) | Valid |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Verification commands for users" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "# Verify checksum" >> $GITHUB_STEP_SUMMARY
          echo "sha256sum -c checksums.txt --ignore-missing" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Verify cosign signature" >> $GITHUB_STEP_SUMMARY
          echo "cosign verify-blob --bundle checksums.txt.sigstore.json \\" >> $GITHUB_STEP_SUMMARY
          echo "  --certificate-identity-regexp='github.com/famclaw/famclaw' \\" >> $GITHUB_STEP_SUMMARY
          echo "  --certificate-oidc-issuer=https://token.actions.githubusercontent.com \\" >> $GITHUB_STEP_SUMMARY
          echo "  checksums.txt" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Verify GitHub attestation" >> $GITHUB_STEP_SUMMARY
          echo "gh attestation verify checksums.txt --repo famclaw/famclaw" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
