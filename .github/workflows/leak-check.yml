name: Leak Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  leak-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Run leak check script
        run: |
          chmod +x scripts/check-setup-leak.sh
          ./scripts/check-setup-leak.sh
