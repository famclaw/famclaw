<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FamClaw — Login</title>
  <style>
    body { font-family: sans-serif; max-width: 360px; margin: 80px auto; padding: 0 1rem; }
    input { width: 100%; padding: .5rem; font-size: 1.5rem; letter-spacing: .5rem;
            text-align: center; box-sizing: border-box; margin-bottom: 1rem; }
    button { width: 100%; padding: .75rem; font-size: 1rem; cursor: pointer; }
    .err { color: #c00; display: none; margin-top: .5rem; }
  </style>
</head>
<body>
  <h2>FamClaw</h2>
  <form id="f" autocomplete="off">
    <label for="pin">Enter parent PIN to continue.</label>
    <input id="pin" name="pin" type="password" inputmode="numeric"
           autocomplete="off" required placeholder="****" autofocus>
    <button type="submit">Unlock</button>
    <p id="err" class="err"></p>
  </form>
  <script>
    const f = document.getElementById('f');
    const errEl = document.getElementById('err');
    f.addEventListener('submit', async e => {
      e.preventDefault();
      errEl.style.display = 'none';
      const pin = document.getElementById('pin').value;
      try {
        const r = await fetch('/login', {
          method: 'POST',
          credentials: 'same-origin',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({pin})
        });
        if (r.ok) {
          window.location.href = '/';
        } else if (r.status === 429) {
          const ra = parseInt(r.headers.get('Retry-After') || '', 10);
          const mins = Number.isFinite(ra) && ra > 0 ? Math.ceil(ra / 60) : 15;
          errEl.textContent = `Too many attempts. Please wait ${mins} minute${mins === 1 ? '' : 's'} and try again.`;
          errEl.style.display = 'block';
        } else {
          errEl.textContent = 'Incorrect PIN. Please try again.';
          errEl.style.display = 'block';
        }
      } catch {
        errEl.textContent = 'Connection error. Please try again.';
        errEl.style.display = 'block';
      }
      document.getElementById('pin').value = '';
    });
  </script>
</body>
</html>
