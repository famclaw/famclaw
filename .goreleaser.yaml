version: 2

project_name: famclaw

builds:
  - id: famclaw
    main: ./cmd/famclaw
    binary: famclaw
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.Version={{.Version}}
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - linux
      - darwin
      - android
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "7"
    ignore:
      - goos: darwin
        goarch: arm
      - goos: android
        goarch: arm
      - goos: android
        goarch: amd64

archives:
  - formats: [tar.xz]
    name_template: >-
      famclaw-{{ .Os }}-{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}

checksum:
  name_template: checksums.txt

signs:
  - cmd: cosign
    artifacts: checksum
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - --bundle=${signature}
      - ${artifact}
      - --yes

sboms:
  - artifacts: archive
    cmd: syft
    args:
      - ${artifact}
      - --output
      - cyclonedx-json=${document}

changelog:
  sort: asc
  groups:
    - title: "New Features"
      regexp: '^feat'
      order: 0
    - title: "Bug Fixes"
      regexp: '^fix'
      order: 1
    - title: "Security"
      regexp: '^.*security|^.*vuln|^.*cve'
      order: 2
    - title: "Refactoring"
      regexp: '^refactor'
      order: 3
    - title: "Documentation"
      regexp: '^docs'
      order: 4
    - title: "Other"
      order: 999
  filters:
    exclude:
      - '^chore\(deps\)'
      - '^Merge'

release:
  prerelease: auto
  extra_files:
    - glob: scripts/install-rpi.sh
    - glob: scripts/install-termux.sh
